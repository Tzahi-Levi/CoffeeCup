<div class="library-page">
  <div class="library-page__header">
    <app-search-bar (searchQuery)="onSearch($event)" />
    <app-fab-button />
  </div>

  @if (loading) {
    <div class="library-page__loading" aria-live="polite">
      <div class="library-page__spinner" role="status" aria-label="Loading coffees"></div>
      <p class="library-page__loading-text">Loading your coffees...</p>
    </div>
  } @else {
    <app-coffee-card-grid
      [coffees]="(filteredCoffees$ | async) ?? []"
      (edit)="onEdit($event)"
      (delete)="onDeleteRequest($event)"
    />
  }

  @if (pendingDeleteId) {
    <app-confirm-dialog
      message="Delete this coffee entry? This cannot be undone."
      (confirmed)="onDeleteConfirmed()"
      (cancelled)="onDeleteCancelled()"
    />
  }
</div>
