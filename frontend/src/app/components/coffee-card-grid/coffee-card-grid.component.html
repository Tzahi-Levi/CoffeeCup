@if (coffees.length === 0) {
  <div class="card-grid__empty">
    <span class="card-grid__empty-icon">☕</span>
    <h3 class="card-grid__empty-title">No coffees yet</h3>
    <p class="card-grid__empty-subtitle">Add your first brew using the + button</p>
  </div>
} @else {
  <div class="card-grid" [@listAnimation]="coffees.length">
    @for (coffee of coffees; track coffee.id) {
      <app-coffee-card
        [coffee]="coffee"
        (edit)="edit.emit(coffee.id)"
        (delete)="delete.emit(coffee.id)"
      />
    }
  </div>
}
